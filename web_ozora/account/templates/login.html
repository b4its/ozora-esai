<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Login | OZORA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="{% static 'css/iziToast.css' %}">
    <link rel="stylesheet" href="{% static 'css/iziToast.min.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      /* ─── CSS Variables ─── */
      :root {
        --blue-50:  #eff6ff;
        --blue-100: #dbeafe;
        --blue-200: #bfdbfe;
        --blue-400: #60a5fa;
        --blue-500: #3b82f6;
        --blue-600: #2563eb;
        --blue-700: #1d4ed8;
        --blue-900: #1e3a8a;

        --accent: #0ea5e9;
        --accent-glow: rgba(14, 165, 233, 0.35);

        /* Light mode tokens */
        --bg-page:      #e8f0fe;
        --bg-card:      #ffffff;
        --bg-input:     #f0f7ff;
        --border:       #c3d9f8;
        --border-focus: var(--blue-500);
        --text-primary: #0f172a;
        --text-secondary:#475569;
        --text-placeholder:#94a3b8;
        --label:        #1e40af;
        --shadow-card:  0 24px 60px rgba(37, 99, 235, 0.15), 0 4px 16px rgba(0,0,0,0.06);
        --shadow-btn:   0 4px 20px rgba(37, 99, 235, 0.5);
        --orb1: rgba(96, 165, 250, 0.25);
        --orb2: rgba(14, 165, 233, 0.18);
        --orb3: rgba(29, 78, 216, 0.12);
        --divider: rgba(37,99,235,0.12);
        --toggle-bg: #dbeafe;
        --toggle-icon: var(--blue-600);
      }

      [data-theme="dark"] {
        --bg-page:      #050d1a;
        --bg-card:      #0d1b2e;
        --bg-input:     #0a1628;
        --border:       #1e3a5f;
        --border-focus: var(--blue-400);
        --text-primary: #e2eeff;
        --text-secondary:#7fa8d4;
        --text-placeholder:#3a6ea0;
        --label:        #93c5fd;
        --shadow-card:  0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(96,165,250,0.08), 0 0 80px rgba(37,99,235,0.1);
        --shadow-btn:   0 4px 24px rgba(14, 165, 233, 0.45);
        --orb1: rgba(37, 99, 235, 0.2);
        --orb2: rgba(14, 165, 233, 0.12);
        --orb3: rgba(96, 165, 250, 0.06);
        --divider: rgba(96,165,250,0.08);
        --toggle-bg: #0d1b2e;
        --toggle-icon: #60a5fa;
      }

      /* ─── Reset ─── */
      *, *::before, *::after {
        margin: 0; padding: 0;
        box-sizing: border-box;
      }

      /* ─── Page ─── */
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-color: var(--bg-page);
        font-family: "DM Sans", sans-serif;
        transition: background-color 0.4s ease, color 0.4s ease;
        overflow: hidden;
        position: relative;
      }

      /* Animated background orbs */
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        animation: drift 12s ease-in-out infinite alternate;
      }
      .bg-orb-1 {
        width: 500px; height: 500px;
        background: var(--orb1);
        top: -120px; left: -100px;
        animation-delay: 0s;
      }
      .bg-orb-2 {
        width: 380px; height: 380px;
        background: var(--orb2);
        bottom: -80px; right: -60px;
        animation-delay: -4s;
      }
      .bg-orb-3 {
        width: 260px; height: 260px;
        background: var(--orb3);
        top: 50%; left: 55%;
        animation-delay: -8s;
      }
      @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, -30px) scale(1.08); }
      }

      /* Grid overlay */
      body::before {
        content: '';
        position: fixed; inset: 0;
        background-image:
          linear-gradient(var(--divider) 1px, transparent 1px),
          linear-gradient(90deg, var(--divider) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        opacity: 0.6;
      }

      /* ─── Theme Toggle ─── */
      .theme-toggle {
        position: fixed;
        top: 20px; right: 20px;
        z-index: 100;
        width: 44px; height: 44px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--toggle-bg);
        color: var(--toggle-icon);
        font-size: 16px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.3s ease;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
      }
      .theme-toggle:hover {
        transform: scale(1.1) rotate(15deg);
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      /* ─── Card ─── */
      .card {
        position: relative;
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border-radius: 20px;
        padding: 44px 40px;
        box-shadow: var(--shadow-card);
        border: 1px solid var(--border);
        backdrop-filter: blur(20px);
        animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        overflow: hidden;
      }
      @keyframes cardIn {
        from { opacity: 0; transform: translateY(30px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Top accent line */
      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent), var(--blue-400));
        border-radius: 20px 20px 0 0;
      }

      /* Subtle inner glow */
      .card::after {
        content: '';
        position: absolute;
        top: -1px; left: -1px; right: -1px;
        height: 120px;
        background: linear-gradient(180deg, rgba(96,165,250,0.04) 0%, transparent 100%);
        pointer-events: none;
        border-radius: 20px 20px 0 0;
      }

      /* ─── Logo / Brand ─── */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        animation: fadeUp 0.5s ease 0.1s both;
      }
      .brand-icon {
        width: 38px; height: 38px;
        background: linear-gradient(135deg, var(--blue-600), var(--accent));
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
        color: white;
        box-shadow: 0 4px 14px rgba(37,99,235,0.4);
      }
      .brand-name {
        font-family: "Sora", sans-serif;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.04em;
        color: var(--text-primary);
      }
      .brand-name span {
        color: var(--blue-500);
      }

      /* ─── Heading ─── */
      .heading {
        margin-bottom: 28px;
        animation: fadeUp 0.5s ease 0.15s both;
      }
      .heading h1 {
        font-family: "Sora", sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .heading p {
        font-size: 14px;
        color: var(--text-secondary);
        margin-top: 6px;
        font-weight: 400;
      }

      /* ─── Form ─── */
      .form-group {
        margin-bottom: 18px;
        animation: fadeUp 0.5s ease both;
      }
      .form-group:nth-child(1) { animation-delay: 0.2s; }
      .form-group:nth-child(2) { animation-delay: 0.25s; }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--label);
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%; transform: translateY(-50%);
        color: var(--text-placeholder);
        font-size: 14px;
        pointer-events: none;
        transition: color 0.25s;
      }
      .input-wrapper input {
        width: 100%;
        height: 48px;
        padding: 0 44px 0 42px;
        background: var(--bg-input);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        color: var(--text-primary);
        outline: none;
        transition: all 0.25s ease;
      }
      .input-wrapper input::placeholder {
        color: var(--text-placeholder);
        font-weight: 300;
      }
      .input-wrapper input:focus {
        border-color: var(--border-focus);
        background: var(--bg-card);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }
      .input-wrapper input:focus + .input-icon,
      .input-wrapper:has(input:focus) .input-icon {
        color: var(--blue-500);
      }
      /* Fix: icon inside wrapper before input */
      .input-wrapper .input-icon { z-index: 1; }

      .eye-toggle {
        position: absolute;
        right: 14px;
        top: 50%; transform: translateY(-50%);
        color: var(--text-placeholder);
        cursor: pointer;
        font-size: 14px;
        padding: 4px;
        transition: color 0.2s;
        z-index: 2;
        background: none;
        border: none;
      }
      .eye-toggle:hover { color: var(--blue-500); }

      /* ─── Submit Button ─── */
      .btn-login {
        width: 100%;
        height: 50px;
        margin-top: 10px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--blue-600) 0%, var(--accent) 100%);
        color: #fff;
        font-family: "Sora", sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-btn);
        animation: fadeUp 0.5s ease 0.3s both;
      }
      .btn-login::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(37,99,235,0.55);
      }
      .btn-login:hover::before { opacity: 1; }
      .btn-login:active { transform: translateY(0); }

      .btn-login .btn-icon {
        margin-left: 8px;
        transition: transform 0.3s;
      }
      .btn-login:hover .btn-icon {
        transform: translateX(4px);
      }

      /* ─── Divider ─── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0;
        animation: fadeUp 0.5s ease 0.35s both;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider span {
        font-size: 11px;
        color: var(--text-placeholder);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      /* ─── Register link ─── */
      .register-link {
        text-align: center;
        font-size: 13px;
        color: var(--text-secondary);
        animation: fadeUp 0.5s ease 0.4s both;
      }
      .register-link a {
        color: var(--blue-500);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s;
      }
      .register-link a:hover {
        color: var(--accent);
        text-decoration: underline;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─── Responsive ─── */
      @media (max-width: 480px) {
        .card { padding: 36px 28px; }
        .heading h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>

    <!-- Background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light mode">
      <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-flask"></i></div>
        <div class="brand-name">OZ<span>ORA</span></div>
      </div>

      <!-- Heading -->
      <div class="heading">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <!-- Form -->
      <form action="#" method="post">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username">Username</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input
              type="text"
              id="id_username"
              name="username"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="id_password">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="id_password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
            <button type="button" class="eye-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          Sign In <i class="fa-solid fa-arrow-right btn-icon"></i>
        </button>

      </form>

      <div class="divider"><span>new here?</span></div>

      <div class="register-link">
        Don't have an account? <a href="{% url 'register' %}">Create one</a>
      </div>

    </div>

    <script src="{% static 'js/iziToast.js' %}"></script>
    <script src="{% static 'js/iziToast.min.js' %}"></script>

    <script>
      /* ── Theme Toggle ── */
      const html        = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon   = document.getElementById('themeIcon');

      // Detect system preference on first load
      const savedTheme = localStorage.getItem('ozora-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');
      applyTheme(initialTheme);

      themeToggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });

      function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('ozora-theme', theme);
        if (theme === 'dark') {
          themeIcon.className = 'fa-solid fa-sun';
        } else {
          themeIcon.className = 'fa-solid fa-moon';
        }
      }

      /* ── Password Toggle ── */
      document.getElementById('togglePassword').addEventListener('click', function () {
        const input   = document.getElementById('id_password');
        const icon    = document.getElementById('eyeIcon');
        const isPass  = input.type === 'password';
        input.type    = isPass ? 'text' : 'password';
        icon.className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
      });
    </script>

    {% if messages %}
    {% for message in messages %}
    <script>
      iziToast.{{ message.tags }}({
        title: '{{ message }}',
        position: 'topRight',
        theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'
      });
    </script>
    {% endfor %}
    {% endif %}

  </body>
</html>
